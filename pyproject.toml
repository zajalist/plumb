[project]
name = "plumb"
version = "0.1.0"
description = "A spatial cortex and a language for physically-grounded, intent-aware 3D worlds."
requires-python = ">=3.12,<3.13"   # NOTE: 3.12, not 3.14 — CoACD/MuJoCo/coal wheels.
dependencies = [
    "pydantic>=2.7",
    "numpy>=1.26",
    "trimesh>=4.4",
    "scipy>=1.13",
    "rerun-sdk>=0.18",
    # cortex-only physics deps (Person A) — add when wiring real backends:
    # "coacd",          # convex decomposition (replaces deprecated V-HACD)
    # "coal" / "hpp-fcl",  # collision / clearance (GJK+EPA)
    # "mujoco",         # stability drop-sim / quasi-static margin
    # "fastmcp",        # MCP server
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.5"]

[tool.ruff]
line-length = 100

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
